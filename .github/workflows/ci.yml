name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "VERSION=$(date +%Y%m%d%H%M%S)" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: pip install -r app/requirements.txt

      - name: Run app test
        run: python -c "import app.app"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devopsapp1:$VERSION ./app
          docker tag ${{ secrets.DOCKER_USERNAME }}/devopsapp1:$VERSION ${{ secrets.DOCKER_USERNAME }}/devopsapp1:latest

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapp1:$VERSION
          docker push ${{ secrets.DOCKER_USERNAME }}/devopsapp1:latest

      - name: Trigger deployment webhook
        run: |
          curl -H "X-Webhook-Token: ${{ secrets.WEBHOOK_SECRET }}" \
          http://161.33.94.11:9000/hooks/deploy